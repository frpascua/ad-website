<body class="hold-transition skin-red sidebar-mini">

                    <a href="#" target="_blank">

            </div>
            <div class="logos">

                </div>

            </div>
            <div class="breadcrumbs">
                <span>
                    <a href="/tech">Administración Digital</a> /
                </span>
                Kanban de proyectos
                <div class="breadcrumbs-right">

                </div>
            </div>
        </header>
        <main class="ur-width-container">

            <div style="display: block; min-height: 1500px;" id="spinner-loader" class="loading-fade show">

                <div style="position: relative;">
                    <div class="spinner">
                        <div class="rect1" style="background-color: #5BC0EB;"></div>
                        <div class="rect2" style="background-color: #FDE74C;"></div>
                        <div class="rect3" style="background-color: #9BC53D;"></div>
                        <div class="rect4" style="background-color: #E55934;"></div>
                        <div class="rect5" style="background-color: #FA7921;"></div>
                    </div>
                    <div style="text-align: center; font-weight: bold; font-size: 18px; color: #333;"
                        class="animated fadeInRight">
                        Hola, bienvenid@
                    </div>
                </div>

            </div>


            <div class="content-wrapper loading-fade" id="kanban-board" style="margin-left:0; display: none;">

                <h1 id="project-name" style="margin-bottom: 0;">Kanban</h1>
                <div id="project-description"
                    style="margin-bottom: 30px; font-size: 1.2em; color: #666; font-weight: 700;">

                </div>

                <div class="row" style="margin-bottom:15px">
                    <div class="col-md-9">
                        <div id="project-readme_html" style="color: #444; margin-bottom: 20px;">

                        </div>
                    </div>
                    <div class="col-md-3">
                        <div style="
                            border-top: solid 5px #444; margin-bottom: 10px; 
                            padding: 0 20px;
                            border-bottom: solid 1px #444; margin-bottom: 10px; ">
                            <div style="margin-top: 10px;">
                                <span style="font-weight: 700; color: #666;">Total:</span>
                            </div>
                            <div style="font-size: 64px; font-weight: 700; color: #444; margin-top: -10px;">
                                <img src="assets/images/timeline_12693779.png"
                                    style="width: 64px; vertical-align: middle; margin-right: 10px;" />
                                <span id="count-total"></span>
                            </div>
                            <div style="text-align: right; font-size: .9em;">
                                <span style="font-weight: 700; color: #666;">Last updated</span>
                                <div style="color: #444; font-weight: 600;" id="last-updated">
                                </div>
                            </div>


                        </div>
                    </div>
                </div>


                <div class="row" style="margin-bottom:15px">
                    <div class="col-md-12">
                        <input id="searchBox" class="form-control" placeholder="Search issues…" />
                    </div>
                    <div class="col-md-6" style="display: none;">
                        <input id="labelFilter" class="form-control" placeholder="Filter by label…" />
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3" style="border-left: solid 3px #6d799a; margin-top: 50px;">
                        <div class="kanban-header">
                            <i class="fa fa-leaf" style="color: #6d799a;"></i> Pending
                            <span class="kanban-column-count" id="count-pending">0</span>
                        </div>
                        <div id="kanban-pending"></div>
                    </div>
                    <div class="col-md-3" style="border-left: solid 3px #9c49d0; margin-top: 50px;">
                        <div class="kanban-header">
                            <i class="fa fa-leaf" style="color: #9c49d0;"></i>
                            <span style="color: #444;"> Doing</span>
                            <span class="kanban-column-count" id="count-doing">0</span>
                        </div>
                        <div id="kanban-doing"></div>
                    </div>
                    <div class="col-md-3" style="border-left: solid 3px #65c156; margin-top: 50px;">
                        <div class="kanban-header">
                            <i class="fa fa-leaf" style="color: #65c156;"></i>
                            <span style="color: #444;"> Done</span>
                            <span class="kanban-column-count" id="count-done">0</span>
                        </div>
                        <div id="kanban-done"></div>
                    </div>
                    <div class="col-md-3" style="border-left: solid 3px #ff9006; margin-top: 50px;">
                        <div class="kanban-header">
                            <i class="fa fa-leaf" style="color: #ff9006;"></i>
                            <span style="color: #444;"> Blocked</span>
                            <span class="kanban-column-count" id="count-blocked">0</span>
                        </div>
                        <div id="kanban-blocked"></div>
                    </div>
                </div>
            </div>



        </main>
        <footer>
            <div class="footer-bar">

            </div>
            <div class="footer-content">
                <p>Universidad de La Rioja</p>
        </footer>
    </div>



    <!-- Handlebars Templates -->
    <script id="issue-modal-template" type="text/x-handlebars-template">
        <div class="modal fade" id="issueModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header" style="background-color: #333;color: #e1e1e1;">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                        <h4 class="modal-title" style="font-weight: 700;">
                            [#{{issue.number}}] {{issue.initiative.description}} / {{issue.title}}
                        </h4>
                    </div>
                    <div class="modal-body">
                        

                        <div class="pull-right">
                            <div class="pull-right text-muted"
                                style="font-size: 20px;text-transform: uppercase; margin-bottom: 10px;">
                                <span class='label' style='background-color:{{style.bgColor}}'>{{statusName}}</span>
                            </div>
                        </div>
                        
                        <div class="row" style="margin: 10px 0; font-weight: 600; color: #333">
                            <div class="col-sm-5">
                                <div class="row">
                                    <label class="col-sm-4 col-form-label">Creado:</label>
                                    <div class="col-sm-8">{{localDateTime issue.created_at}}h</div>
                                </div>
                                <div class="row">
                                    <label class="col-sm-4 col-form-label">Milestone:</label>
                                    <div class="col-sm-8">{{default issue.milestone "---"}}</div>
                                </div>
                               
                                <div class="row">
                                    <label class="col-sm-4 col-form-label">Estado:</label>
                                    <div class="col-sm-8" style="color: {{kanbanColor issue.status}}">
                                        <i class="fa fa-leaf" style=""></i>
                                        <span style="text-transform: uppercase; font-weight: 700;">{{issue.status}}</span>
                                        
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-5">
                                <div class="row">
                                    <label class="col-sm-5 col-form-label">Modificado:</label>
                                    <div class="col-sm-7">{{localDateTime issue.updated_at}}h</div>
                                </div>
                               
                                <div class="row">
                                    <label class="col-sm-5 col-form-label">Prioridad:</label>
                                    <div class="col-sm-7 priority-container">
                                            <span style="color: #666; margin-right: 6px;">({{issue.priority}})</span>
                                            <span class="square {{#if (gte (priorityNumber issue.priority) 1)}}active{{/if}}"></span>
                                            <span class="square {{#if (gte (priorityNumber issue.priority) 2)}}active{{/if}}"></span>
                                            <span class="square {{#if (gte (priorityNumber issue.priority) 3)}}active{{/if}}"></span>
                                            <span class="square {{#if (gte (priorityNumber issue.priority) 4)}}active{{/if}}"></span>
                                            <span class="square {{#if (gte (priorityNumber issue.priority) 5)}}active{{/if}}"></span>
                                    </div>
                                </div>

                                <div class="row">
                                    <label class="col-sm-5 col-form-label">OTD:</label>
                                    <div class="col-sm-7">
                                        <span style="text-transform: uppercase; font-weight: 700;">
                                        {{default issue.otd_category.name "---"}}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-sm-2">

                                <div class="row">
                                    {{localeDate issue.start_date}}
                                </div>
                                <div class="row" style="padding: 4px 0;">
                                     <img class="img-circle elevation-2" src="assets/images/avatar/{{default issue.assignee "somebody"}}.png" 
                                            style="width:32px;"
                                            title="{{issue.assignee}}"
                                            alt="User Avatar">
                                </div>
                               
                               
                            </div>

                        </div>

                        <div class="row" style="margin: 10px 0; border-top: solid 1px #ccc; padding-top: 10px;">
                            <div class="col-md-10">
                                <div class="form-group" style="display: none;">
                                    <label for="recipient-name" class="control-label">Proyecto:</label>
                                    <div>
                                        <span style="display: inline-block; text-align: center; width: 20px; color: white; font-weight:700; padding: 1px 6px; 
                                        background-color: {{initiativeBgColor issue}}; color: {{initiativeFgColor issue}};"> P</span>
                                        <span style="padding-left: 3px; border-left: solid 2px #CCC; font-weight: 700;  color: #444;
                                            border-left-color: {{initiativeBgColor issue}}">
                                            {{issue.initiative.description}}
                                        </span>
                                    </div>
                                </div>			

                                <div class="form-group">
                                    <div>
                                        <span class="badge" style="text-transform: uppercase; 
                                        background-color: {{initiativeBgColor issue}}; color: {{initiativeFgColor issue}};
                                        padding: 4px 8px; ">
                                            <i class="fa fa-circle-o"></i>
                                            {{issue.initiative.description}}
                                        </span>
                                        <span class="badge" style="
                                            padding-left: 3px; 
                                            background-color: white;
                                            border-radius: 0;
                                            border-left: solid 3px #CCC; 
                                            font-weight: 700;  color: #666;
                                            border-left-color: {{initiativeFgColor issue}};
                                            text-transform: uppercase; ">
                                            {{issue.initiative.name}}
                                        </span>
                                    </div>
                                    
                                </div>
                                <div>
                                    <h2 style="margin: 0;line-height: 2.2rem; font-size: 1.7rem;">
                                        {{issue.title}}
                                    </h2>
                                    <div style="font-weight: 700;color: #565656;"> 
                                        {{issue.subtitle}}
                                    </div>
                                     <div style="margin-top: 10px; padding-left: 10px; border-left: solid 3px #b8b8b8; font-weight: 600;  color: #444;">
                                         {{{issue.body_html}}}   
                                    </div>
                                </div>
                                <div class="form-group" style="display: none;">
                                    <label for="recipient-name" class="control-label" style="color: #999;">Título:</label>
                                    <span style="font-weight: 700;">    
                                    {{issue.title}}
                                    </span>
                                    
                                    <div style="padding-left: 10px; border-left: solid 3px #444; font-weight: 600;  color: #444;">
                                        {{issue.subtitle}}
                                    </div>
                                </div>
                                <div class="form-group" style="display: none;">
                                    <label for="recipient-name" class="control-label" style="color: #999;">Descripción:</label>
                                    <div style="padding-left: 20px; border-left: solid 3px #666; font-weight: 600;  color: #444;">
                                        {{{issue.body_html}}}   
                                    </div>
                                </div>
                                <div class="form-group">
                                    {{#splitLabels issue.labels}}
                                    <span class="badge" style="background-color: {{labelBgColor label}};">
                                        <i class="fa fa-tag"></i> {{label}}
                                    </span>
                                    {{/splitLabels}}
                                </div>
                                
                                <div class="form-group">
                                    <label for="recipient-name" class="control-label" style="color: #999;">
                                        <i class="fa fa-fw fa-comment-o"></i> Comentarios:
                                    </label>
                                    <div>
                                        <ul style="list-style-type: none; padding-left: 24px; font-size: .9em; color: #444;">
                                            {{#each issue.comments}}
                                            <li style="margin-bottom: 20px">
                                                 <span><b>{{localDateTime this.created_at}} by {{this.author}}:</b></span>
                                                 <div class="reactions-container-modal" style="margin-top: 4px;">
                                                    {{#if reactions}}
                                                        {{#each reactions}}
                                                            {{reactionBadge ../reactions @key}}
                                                        {{/each}}
                                                    {{else}}
                                                        <span class="text-muted">No hay reacciones</span>
                                                    {{/if}}
                                                </div>
                                                {{{this.body_html}}}
                                            </li>
                                            {{else}}
                                            <li class="text-muted">No hay comentarios</li>
                                            {{/each}}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <i class="fa fa-fw fa-tags"></i>
                                <span style="font-weight: 700; color: #666;">
                                    {{default issue.issueType.name "Tarea"}}
                                </span>

                            </div>
                        </div>

                    </div>
                    <div class="modal-footer">
                        <span style="margin: 0 20px;">
                        <a href="https://github.com/frpascua/tharros/issues/{{issue.number}}" 
                        target="_blank"
                        style="font-weight: bold;"
                        >#{{issue.number}} at GitHub <i class="fa fa-external-link"></i></a>
                        </span>
                        <button type="button" class="btn btn-default" data-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
    <script src="assets/js/board.js"></script>
    <script src="https://sede.unirioja.es/static/themes/lte/bootstrap/js/bootstrap.min.js"></script>

</body>

</html>
