    <script>
        var offset = 220;
        var duration = 500;
        var fixmeTop = $('.fixme').offset().top;       // get initial position of the element
        $(window).scroll(function () {                  // assign scroll event listener
            var currentScroll = $(window).scrollTop(); // get current position
            if (currentScroll >= fixmeTop) {           // apply position: fixed if you
                $('.fixme').css({                      // scroll to that element or below it
                    position: 'fixed',
                    top: '10px',
                    right: '10px'
                });
            } else {                                   // apply position: static
                $('.fixme').css({                      // if you scroll above it
                    position: 'static'
                });
            }

            if ($(this).scrollTop() > offset) {
                $('.back-to-top').fadeIn(duration);
            } else {
                $('.back-to-top').fadeOut(duration);
            }
        });

        $(window).on('scroll', function () {
            $('.target').each(function () {
                if ($(window).scrollTop() >= $(this).offset().top) {
                    var id = $(this).attr('id');
                    $('#nav nav a').removeClass('active');
                    $('#nav nav a[href=#' + id + ']').addClass('active');
                }
            });
        });

        $('.back-to-top').click(function (event) {
            event.preventDefault();
            $('html, body').animate({ scrollTop: 0 }, duration);
            return false;
        })

    </script>

    <script>
        var env = nunjucks.configure('/api/berkana/resources/nunjucks', { autoescape: true, throwOnUndefined: true });
        env.addFilter('dateFormat', function (str, dateFormat) {
            var date = new Date(str)
            var options = { year: 'numeric', month: 'numeric', day: 'numeric' };
            return date.toLocaleDateString(dateFormat, options);
        });
        env.addFilter('localeDate', function (str, options) {
            var date = new Date(str)
            return date.toLocaleString(options);
        });
    </script>
